<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You — Exodus Growth</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Ambient animated background -->
  <div class="bg-orbs" aria-hidden="true">
    <div class="orb orb-3"></div>
  </div>

  <!-- ───── NAV ───── -->
  <header class="site-header" id="site-header">
    <div class="header-inner">
      <a href="index.html" class="logo" id="logo">
        <img src="logo.png" alt="Exodus Growth" class="logo-img" />
      </a>
    </div>
  </header>

  <!-- ───── THANK YOU SECTION ───── -->
  <main class="thank-you-main">
    <section class="form-section">
      <div class="form-card text-center animate-in visible">
        <div class="success-icon">✅</div>
        <h2>Application Received!</h2>
        <p class="thank-you-sub">Your strategy call is officially booked.</p>
        <p class="thank-you-desc">Check your email for calendar details and a link to join the call. Julian is looking forward to speaking with you and discussing your blueprint for success in the next 90 days.</p>
        
        <a href="index.html" class="cta-btn back-btn">
          <span class="cta-text">Return to Homepage</span>
        </a>
      </div>
    </section>
  </main>

</body>
</html>
