<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Application — Exodus Growth</title>
  <meta name="description" content="Apply for your free strategy call with Julian Ramos." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Ambient animated background -->
  <div class="bg-orbs" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2" style="background: var(--accent-start)"></div>
  </div>

  <!-- ───── NAV ───── -->
  <header class="site-header" id="site-header">
    <div class="header-inner">
      <a href="index.html" class="logo" id="logo">
        <img src="logo.png" alt="Exodus Growth" class="logo-img" />
      </a>
    </div>
  </header>

  <!-- ───── ONBOARDING FORM ───── -->
  <main class="onboarding-main">
    <section class="form-section">
      <div class="form-card animate-in visible">
        <div class="form-header">
          <h2>Apply for Your Free Strategy Call</h2>
          <p>Please fill out the form below so we can prepare for our call. We only have 5 spots available this week.</p>
        </div>

        <form action="thank-you.html" method="GET" class="onboarding-form">
          <div class="form-group">
            <label for="fullName">Full Name</label>
            <input type="text" id="fullName" name="fullName" placeholder="e.g. John Doe" required />
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="john@example.com" required />
          </div>

          <div class="form-group">
            <label for="phone">Phone Number (Optional)</label>
            <input type="tel" id="phone" name="phone" placeholder="For SMS reminders" />
          </div>

          <div class="form-group">
            <label for="goal">What is your primary goal?</label>
            <select id="goal" name="goal" required>
              <option value="" disabled selected>Select one...</option>
              <option value="energy">Increase daily energy and focus</option>
              <option value="physique">Lose fat and build muscle</option>
              <option value="hormones">Optimize hormones naturally</option>
              <option value="all">All of the above</option>
            </select>
          </div>

          <div class="form-group">
            <label for="challenge">What is the biggest challenge preventing your success?</label>
            <textarea id="challenge" name="challenge" rows="3" placeholder="Briefly describe what you've tried and what isn't working..." required></textarea>
          </div>

          <button type="submit" class="cta-btn submit-btn">
            <span class="cta-text">Continue to Scheduling</span>
            <span class="cta-arrow">→</span>
          </button>
          
          <p class="form-footer-note">🔒 Your information is secure. No obligation.</p>
        </form>
      </div>
    </section>
  </main>

  <!-- ───── FOOTER ───── -->
  <footer class="site-footer">
    <p>&copy; 2026 Exodus Growth — Julian Ramos. All rights reserved.</p>
  </footer>

</body>
</html>
